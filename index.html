<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кирилл приглашает на день рождения!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: #0B0E27;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* Звёздное небо */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .stars::before,
    .stars::after {
      content: '';
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite alternate;
    }

    .stars::before {
      box-shadow:
        20px 40px 0 #fff, 80px 120px 0 #fff, 150px 60px 0 #fff,
        220px 180px 0 #fff, 310px 90px 0 #fff, 400px 200px 0 #fff,
        500px 50px 0 #fff, 580px 170px 0 #fff, 680px 100px 0 #fff,
        750px 220px 0 #fff, 100px 300px 0 #fff, 300px 350px 0 #fff,
        500px 380px 0 #fff, 700px 320px 0 #fff, 200px 450px 0 #fff,
        450px 420px 0 #fff, 620px 480px 0 #fff, 800px 400px 0 #fff,
        900px 150px 0 #fff, 1000px 250px 0 #fff,
        50px 550px 0 #fff, 350px 600px 0 #fff, 650px 580px 0 #fff,
        920px 550px 0 #fff, 150px 680px 0 #fff, 550px 700px 0 #fff,
        850px 650px 0 #fff, 1050px 600px 0 #fff;
      animation-delay: 0s;
    }

    .stars::after {
      width: 1px;
      height: 1px;
      box-shadow:
        50px 80px 0 #FFD700, 180px 200px 0 #FFD700, 350px 140px 0 #FFD700,
        480px 280px 0 #FFD700, 600px 60px 0 #FFD700, 820px 180px 0 #FFD700,
        950px 320px 0 #FFD700, 150px 380px 0 #FFD700, 550px 350px 0 #FFD700,
        780px 450px 0 #FFD700, 320px 500px 0 #FFD700, 680px 550px 0 #FFD700,
        880px 500px 0 #FFD700, 1020px 400px 0 #FFD700;
      animation-delay: 1.5s;
    }

    @keyframes twinkle {
      0% { opacity: 0.2; }
      100% { opacity: 1; }
    }

    /* Планеты */
    .planet {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.15;
    }

    .planet-1 {
      width: 120px;
      height: 120px;
      background: radial-gradient(circle at 30% 30%, #9333EA, #4C1D95);
      top: 10%;
      right: -30px;
      animation: float 8s ease-in-out infinite;
    }

    .planet-2 {
      width: 80px;
      height: 80px;
      background: radial-gradient(circle at 30% 30%, #3B82F6, #1E3A5F);
      bottom: 15%;
      left: -20px;
      animation: float 10s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-30px); }
    }

    /* Ракета */
    .rocket {
      position: fixed;
      z-index: 1;
      font-size: 48px;
      animation: fly 7s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes fly {
      0% {
        transform: translate(-80px, 100vh) rotate(-25deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translate(calc(100vw + 80px), -80px) rotate(-25deg);
        opacity: 0;
      }
    }

    /* Основной контент */
    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
      max-width: 520px;
      width: 100%;
    }

    h1 {
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      font-weight: 900;
      color: #FF6B35;
      margin-bottom: 0.5rem;
      line-height: 1.2;
    }

    .age-badge {
      display: inline-block;
      background: linear-gradient(135deg, #FF6B35, #FFD700);
      color: #0B0E27;
      font-weight: 900;
      font-size: clamp(2rem, 6vw, 3.5rem);
      padding: 0.3rem 1.5rem;
      border-radius: 50px;
      margin: 1rem 0 2rem;
      box-shadow: 0 0 30px rgba(255, 107, 53, 0.4);
    }

    .details {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 2rem;
      backdrop-filter: blur(10px);
    }

    .detail-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      font-size: clamp(1rem, 3vw, 1.25rem);
      font-weight: 600;
    }

    .detail-item:last-of-type {
      margin-bottom: 1.5rem;
    }

    .detail-icon {
      font-size: 1.5rem;
      width: 2rem;
      text-align: center;
      flex-shrink: 0;
    }

    .detail-label {
      color: #8ECAE6;
      font-weight: 700;
      margin-right: 0.25rem;
    }

    .map-btn {
      display: inline-block;
      background: #FF6B35;
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      font-size: 1.05rem;
      padding: 0.85rem 2rem;
      border-radius: 50px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
      cursor: pointer;
      border: none;
    }

    .map-btn:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 6px 25px rgba(255, 107, 53, 0.6);
    }

    .map-btn:active {
      transform: translateY(0) scale(1.02);
    }

    .footer-text {
      margin-top: 2rem;
      font-size: clamp(1.3rem, 4vw, 1.8rem);
      font-weight: 800;
      color: #FFD700;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }
  </style>
</head>
<body>

  <div class="stars"></div>
  <div class="planet planet-1"></div>
  <div class="planet planet-2"></div>
  <div class="rocket">🚀</div>

  <div class="content">
    <h1>Кирилл приглашает на день рождения!</h1>

    <div class="age-badge">4 года</div>

    <div class="details">
      <div class="detail-item">
        <span class="detail-icon">🗓</span>
        <span><span class="detail-label">Дата:</span> 4 июля 2026</span>
      </div>
      <div class="detail-item">
        <span class="detail-icon">⏰</span>
        <span><span class="detail-label">Время:</span> 13:00</span>
      </div>
      <div class="detail-item">
        <span class="detail-icon">📍</span>
        <span><span class="detail-label">Место:</span> Kids Castle</span>
      </div>
      <a class="map-btn" href="#" target="_blank" rel="noopener noreferrer" id="mapLink">
        Открыть на Яндекс Картах
      </a>
    </div>

    <div class="footer-text">Ждём тебя! 🚀</div>
  </div>

</body>
</html>
