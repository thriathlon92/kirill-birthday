<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кирилл приглашает на день рождения!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: #0B0E27;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* Звёздное небо */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .stars-big,
    .stars-small,
    .stars-xl {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .stars-xl::before,
    .stars-xl::after,
    .stars-big::before,
    .stars-big::after,
    .stars-small::before,
    .stars-small::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite alternate;
    }

    .stars-xl::before {
      width: 7px;
      height: 7px;
      box-shadow:
        130px 50px 0 #fff, 350px 180px 0 #fff, 550px 90px 0 #fff,
        760px 210px 0 #fff, 920px 320px 0 #fff, 180px 390px 0 #fff,
        420px 480px 0 #fff, 650px 370px 0 #fff, 890px 510px 0 #fff,
        260px 610px 0 #fff, 530px 690px 0 #fff, 780px 580px 0 #fff,
        940px 750px 0 #fff, 320px 790px 0 #fff;
      animation-delay: 0s;
    }

    .stars-xl::after {
      width: 6px;
      height: 6px;
      box-shadow:
        40px 140px 0 #FFD700, 250px 70px 0 #FFD700, 460px 230px 0 #FFD700,
        640px 130px 0 #FFD700, 840px 280px 0 #FFD700, 80px 320px 0 #FFD700,
        310px 450px 0 #FFD700, 510px 550px 0 #FFD700, 730px 430px 0 #FFD700,
        970px 650px 0 #FFD700, 170px 690px 0 #FFD700, 400px 770px 0 #FFD700;
      animation-delay: 1s;
    }

    .stars-big::before,
    .stars-big::after {
      width: 5px;
      height: 5px;
    }

    .stars-big::before {
      box-shadow:
        20px 30px 0 #fff, 100px 50px 0 #fff, 200px 120px 0 #fff,
        320px 80px 0 #fff, 420px 190px 0 #fff, 520px 30px 0 #fff,
        620px 140px 0 #fff, 740px 60px 0 #fff, 840px 200px 0 #fff,
        960px 100px 0 #fff, 1100px 170px 0 #fff, 120px 300px 0 #fff,
        280px 260px 0 #fff, 450px 350px 0 #fff, 600px 290px 0 #fff,
        750px 380px 0 #fff, 900px 310px 0 #fff, 1030px 370px 0 #fff,
        200px 450px 0 #fff, 380px 490px 0 #fff, 550px 420px 0 #fff,
        700px 500px 0 #fff, 860px 460px 0 #fff, 1000px 520px 0 #fff,
        150px 600px 0 #fff, 340px 580px 0 #fff, 510px 650px 0 #fff,
        680px 600px 0 #fff, 830px 680px 0 #fff, 980px 630px 0 #fff,
        60px 720px 0 #fff, 270px 750px 0 #fff, 480px 710px 0 #fff,
        640px 780px 0 #fff, 790px 730px 0 #fff, 940px 800px 0 #fff;
      animation-delay: 0s;
    }

    .stars-big::after {
      box-shadow:
        60px 90px 0 #FFD700, 160px 160px 0 #FFD700, 280px 40px 0 #FFD700,
        380px 250px 0 #FFD700, 510px 110px 0 #FFD700, 650px 230px 0 #FFD700,
        780px 150px 0 #FFD700, 920px 280px 0 #FFD700, 1050px 90px 0 #FFD700,
        100px 380px 0 #FFD700, 320px 330px 0 #FFD700, 490px 460px 0 #FFD700,
        630px 390px 0 #FFD700, 810px 530px 0 #FFD700, 960px 420px 0 #FFD700,
        180px 550px 0 #FFD700, 410px 620px 0 #FFD700, 590px 560px 0 #FFD700,
        740px 690px 0 #FFD700, 900px 590px 0 #FFD700, 1060px 700px 0 #FFD700;
      animation-delay: 1.5s;
      width: 4px;
      height: 4px;
    }

    .stars-small::before {
      width: 2px;
      height: 2px;
      box-shadow:
        40px 70px 0 #aaccff, 130px 200px 0 #aaccff, 240px 90px 0 #aaccff,
        350px 180px 0 #aaccff, 470px 270px 0 #aaccff, 590px 160px 0 #aaccff,
        700px 280px 0 #aaccff, 820px 50px 0 #aaccff, 940px 340px 0 #aaccff,
        70px 480px 0 #aaccff, 220px 410px 0 #aaccff, 370px 570px 0 #aaccff,
        530px 500px 0 #aaccff, 670px 440px 0 #aaccff, 870px 620px 0 #aaccff,
        140px 680px 0 #aaccff, 300px 700px 0 #aaccff, 460px 770px 0 #aaccff,
        620px 680px 0 #aaccff, 780px 790px 0 #aaccff, 930px 750px 0 #aaccff;
      animation: twinkle 4s ease-in-out infinite alternate;
      animation-delay: 0.8s;
    }

    .stars-small::after {
      width: 1px;
      height: 1px;
      box-shadow:
        30px 130px 0 #ffddaa, 190px 240px 0 #ffddaa, 310px 110px 0 #ffddaa,
        440px 210px 0 #ffddaa, 560px 300px 0 #ffddaa, 680px 70px 0 #ffddaa,
        800px 310px 0 #ffddaa, 910px 210px 0 #ffddaa, 1020px 140px 0 #ffddaa,
        50px 420px 0 #ffddaa, 250px 560px 0 #ffddaa, 400px 460px 0 #ffddaa,
        580px 630px 0 #ffddaa, 720px 540px 0 #ffddaa, 880px 670px 0 #ffddaa,
        110px 770px 0 #ffddaa, 360px 660px 0 #ffddaa, 540px 820px 0 #ffddaa,
        700px 710px 0 #ffddaa, 860px 840px 0 #ffddaa, 1010px 640px 0 #ffddaa;
      animation: twinkle 3.5s ease-in-out infinite alternate;
      animation-delay: 2s;
    }

    @keyframes twinkle {
      0% { opacity: 0.2; }
      100% { opacity: 1; }
    }

    /* Планеты */
    .planet {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.2;
    }

    .planet-1 {
      width: 200px;
      height: 200px;
      background: radial-gradient(circle at 35% 35%, #d0d0d0, #999 40%, #666 70%, #444);
      box-shadow: inset -20px -15px 30px rgba(0,0,0,0.6), 0 0 50px rgba(200,200,200,0.15);
      top: 5%;
      right: 20px;
      animation: float 12s ease-in-out infinite;
    }

    .planet-1::before {
      content: '';
      position: absolute;
      width: 30px;
      height: 30px;
      background: radial-gradient(circle, #aaa, #777);
      border-radius: 50%;
      top: 40px;
      left: 50px;
      opacity: 0.4;
    }

    .planet-1::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      background: radial-gradient(circle, #bbb, #888);
      border-radius: 50%;
      top: 90px;
      left: 30px;
      opacity: 0.35;
    }

    .planet-2 {
      width: 140px;
      height: 140px;
      background: radial-gradient(circle at 30% 30%, #c0c0c0, #888 45%, #555 70%, #333);
      box-shadow: inset -15px -12px 25px rgba(0,0,0,0.5), 0 0 40px rgba(180,180,180,0.12);
      bottom: 6%;
      left: 10px;
      animation: float 14s ease-in-out infinite reverse;
    }

    .planet-2::before {
      content: '';
      position: absolute;
      width: 32px;
      height: 32px;
      background: radial-gradient(circle, #999, #666);
      border-radius: 50%;
      top: 30px;
      right: 40px;
      opacity: 0.35;
    }

    .planet-2::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      background: radial-gradient(circle, #bbb, #777);
      border-radius: 50%;
      top: 80px;
      right: 28px;
      opacity: 0.45;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-30px); }
    }

    /* Ракеты */
    .rocket {
      position: fixed;
      z-index: 3;
      font-size: 56px;
      pointer-events: none;
      opacity: 0;
    }

    .rocket-1 {
      animation: fly1 8s ease-in-out infinite;
    }

    .rocket-2 {
      animation: fly2 8s ease-in-out infinite;
      animation-delay: 2.5s;
    }

    .rocket-3 {
      animation: fly3 8s ease-in-out infinite;
      animation-delay: 5s;
    }

    @keyframes fly1 {
      0% {
        transform: translate(-150px, 110vh) rotate(-15deg);
        opacity: 0;
      }
      8% {
        opacity: 1;
      }
      92% {
        opacity: 1;
      }
      100% {
        transform: translate(115vw, -150px) rotate(-15deg);
        opacity: 0;
      }
    }

    @keyframes fly2 {
      0% {
        transform: translate(115vw, 115vh) rotate(205deg);
        opacity: 0;
      }
      8% {
        opacity: 1;
      }
      92% {
        opacity: 1;
      }
      100% {
        transform: translate(-150px, -150px) rotate(205deg);
        opacity: 0;
      }
    }

    @keyframes fly3 {
      0% {
        transform: translate(-150px, 30vh) rotate(-5deg);
        opacity: 0;
      }
      8% {
        opacity: 1;
      }
      92% {
        opacity: 1;
      }
      100% {
        transform: translate(115vw, -100px) rotate(-5deg);
        opacity: 0;
      }
    }

    /* Основной контент */
    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
      max-width: 520px;
      width: 100%;
    }

    h1 {
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      font-weight: 900;
      color: #FF6B35;
      margin-bottom: 0.5rem;
      line-height: 1.2;
    }

    .age-badge {
      display: inline-block;
      background: linear-gradient(135deg, #FF6B35, #FFD700);
      color: #0B0E27;
      font-weight: 900;
      font-size: clamp(2rem, 6vw, 3.5rem);
      padding: 0.3rem 1.5rem;
      border-radius: 50px;
      margin: 1rem 0 2rem;
      box-shadow: 0 0 30px rgba(255, 107, 53, 0.4);
    }

    .details {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 2rem;
      backdrop-filter: blur(10px);
    }

    .detail-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      font-size: clamp(1rem, 3vw, 1.25rem);
      font-weight: 600;
    }

    .detail-item:last-of-type {
      margin-bottom: 1.5rem;
    }

    .detail-icon {
      font-size: 1.5rem;
      width: 2rem;
      text-align: center;
      flex-shrink: 0;
    }

    .detail-label {
      color: #8ECAE6;
      font-weight: 700;
      margin-right: 0.25rem;
    }

    .map-btn {
      display: inline-block;
      background: #FF6B35;
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      font-size: 1.05rem;
      padding: 0.85rem 2rem;
      border-radius: 50px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
      cursor: pointer;
      border: none;
    }

    .map-btn:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 6px 25px rgba(255, 107, 53, 0.6);
    }

    .map-btn:active {
      transform: translateY(0) scale(1.02);
    }

    .footer-text {
      margin-top: 2rem;
      font-size: clamp(1.3rem, 4vw, 1.8rem);
      font-weight: 800;
      color: #FFD700;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }
  </style>
</head>
<body>

  <div class="stars">
    <div class="stars-big"></div>
    <div class="stars-small"></div>
    <div class="stars-xl"></div>
  </div>
  <div class="planet planet-1"></div>
  <div class="planet planet-2"></div>
  <div class="rocket rocket-1">🚀</div>
  <div class="rocket rocket-2">🚀</div>
  <div class="rocket rocket-3">🚀</div>

  <div class="content">
    <h1>Кирилл приглашает на день рождения!</h1>

    <div class="age-badge">4 года</div>

    <div class="details">
      <div class="detail-item">
        <span class="detail-icon">🗓</span>
        <span><span class="detail-label">Дата:</span> 4 июля 2026</span>
      </div>
      <div class="detail-item">
        <span class="detail-icon">⏰</span>
        <span><span class="detail-label">Время:</span> 13:00</span>
      </div>
      <div class="detail-item">
        <span class="detail-icon">📍</span>
        <span><span class="detail-label">Место:</span> Kids Castle</span>
      </div>
      <a class="map-btn" href="#" target="_blank" rel="noopener noreferrer" id="mapLink">
        Открыть на Яндекс Картах
      </a>
    </div>

    <div class="footer-text">Ждём тебя! 🚀</div>
  </div>
